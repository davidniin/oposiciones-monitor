name: Monitor oposiciones

on:
  schedule:
    # 08:00 UTC = 09:00 CET / 10:00 CEST (en verano se desplaza 1h)
    - cron: "0 8 * * *"
    # 14:00 UTC = 15:00 CET / 16:00 CEST
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: oposiciones-monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TECH_EMAIL: ${{ secrets.TECH_EMAIL }}
        run: node src/main.js

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain state/seen.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/seen.json
            git commit -m "chore: update seen.json [skip ci]"
            git push
          else
            echo "No changes to state/seen.json"
          fi
